name: Secure MLOps Platform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Create local env file for CI
        run: |
          mkdir -p secrets
          echo "APP_ENV=ci" > secrets/.env
          echo "MODEL_PATH=model_artifacts/fraud_model.joblib" >> secrets/.env
          echo "API_KEY=ci-secret-key" >> secrets/.env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline
        run: |
          python ml_pipeline/train.py

      - name: Run tests
        run: |
          pytest

      - name: Build Docker image
        run: |
          docker build -t secure-fraud-ml-api .